// ── TAB: TIMELINE ──

function TimelineTab() {
  // ── Past work month mapping: Nov 2024 = 0 ... Apr 2026 = 17 ──
  const pastMonthLabels = ["Nov","Dec","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr"];
  const pastYearLabels = ["2024","","2025","","","","","","","","","","","","2026","","",""];
  const totalPastMonths = 18;
  const LW = 210; // label width

  const parseMonth = (s) => {
    const map = { "Nov 2024":0,"Dec 2024":1,"Jan 2025":2,"Feb 2025":3,"Mar 2025":4,"Apr 2025":5,"May 2025":6,"Jun 2025":7,"Jul 2025":8,"Aug 2025":9,"Sep 2025":10,"Oct 2025":11,"Nov 2025":12,"Dec 2025":13,"Jan 2026":14,"Feb 2026":15,"Mar 2026":16,"Apr 2026":17 };
    return map[s] ?? null;
  };

  // Parse milestone dates into { start, end } month indices
  const parseMilestoneDate = (d) => {
    // Handle ranges like "Jul–Sep 2025" or "Oct 2025–Feb 2026" or "Dec 2025–Apr 2026"
    const rangeMatch = d.match(/^(\w+)\s*[\u2013–-]\s*(\w+)\s+(\d{4})$/);
    if (rangeMatch) { return { start: parseMonth(`${rangeMatch[1]} ${rangeMatch[3]}`), end: parseMonth(`${rangeMatch[2]} ${rangeMatch[3]}`) }; }
    const crossYearMatch = d.match(/^(\w+)\s+(\d{4})\s*[\u2013–-]\s*(\w+)\s+(\d{4})$/);
    if (crossYearMatch) { return { start: parseMonth(`${crossYearMatch[1]} ${crossYearMatch[2]}`), end: parseMonth(`${crossYearMatch[3]} ${crossYearMatch[4]}`) }; }
    const single = parseMonth(d);
    if (single !== null) return { start: single, end: single };
    return null;
  };

  // Build per-theme milestone positions
  const themeRows = themes.map(t => ({
    title: t.title,
    color: t.color,
    milestones: t.milestones.map(m => ({ ...m, pos: parseMilestoneDate(m.date) })).filter(m => m.pos),
  }));

  // Ticket resolution heatmap: count resolved tickets per month
  const resolvedByMonth = useMemo(() => {
    const counts = new Array(totalPastMonths).fill(0);
    tickets.forEach(t => {
      if (!t.resolved) return;
      const [y, m] = t.resolved.split("-").map(Number);
      let idx;
      if (y === 2024) idx = m - 11; // Nov=0, Dec=1
      else if (y === 2025) idx = m + 1; // Jan=2, Feb=3...
      else if (y === 2026) idx = m + 13; // Jan=14, Feb=15...
      if (idx >= 0 && idx < totalPastMonths) counts[idx]++;
    });
    return counts;
  }, []);
  const maxResolved = Math.max(...resolvedByMonth, 1);

  // ── Future roadmap ──
  const totalWeeks = 19;
  const futureMonths = [{ label: "Apr", start: 0, end: 1.5 }, { label: "May", start: 1.5, end: 5.5 }, { label: "Jun", start: 5.5, end: 10 }, { label: "Jul", start: 10, end: 14.5 }, { label: "Aug", start: 14.5, end: 19 }];

  return (
    <div>
      {/* ════════ PAST WORK TIMELINE ════════ */}
      <SectionBar color={C.success}>Work Completed · Nov 2024 – Apr 2026</SectionBar>
      <p style={{ fontSize: 13, color: C.textMuted, marginBottom: 16, lineHeight: 1.6 }}>
        Each row shows when milestones landed for that theme. Dots are individual deliverables; bars span multi-month efforts. The heatmap at the bottom shows ticket resolution volume per month.
      </p>
      <div style={{ background: C.bg, borderRadius: 12, border: `1px solid ${C.borderSubtle}`, padding: "20px 20px 16px", overflowX: "auto" }}>
        {/* Month header */}
        <div style={{ display: "flex", marginLeft: LW }}>
          {pastMonthLabels.map((m, i) => (
            <div key={i} style={{ width: `${100 / totalPastMonths}%`, textAlign: "center", flexShrink: 0 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.textSubtle }}>{m}</div>
              {pastYearLabels[i] && <div style={{ fontSize: 9, color: C.textSubtle, marginTop: 1 }}>{pastYearLabels[i]}</div>}
            </div>
          ))}
        </div>
        <div style={{ height: 1, background: C.borderSubtle, marginTop: 6, marginBottom: 8, marginLeft: LW }} />

        {/* Theme rows */}
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {themeRows.map((row, ri) => (
            <div key={ri} style={{ display: "flex", alignItems: "center", minHeight: 32 }}>
              <div style={{ width: LW, flexShrink: 0, paddingRight: 12, display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: row.color, flexShrink: 0 }} />
                <div style={{ fontSize: 11, fontWeight: 600, color: C.text, lineHeight: 1.3 }}>{row.title}</div>
              </div>
              <div style={{ flex: 1, position: "relative", height: 24 }}>
                {/* Background track */}
                <div style={{ position: "absolute", inset: 0, background: C.bgSunken, borderRadius: 4 }} />
                {/* Milestone dots/bars */}
                {row.milestones.map((m, mi) => {
                  const { start, end } = m.pos;
                  const left = `${(start / totalPastMonths) * 100}%`;
                  if (start === end) {
                    // Dot
                    return <div key={mi} title={`${m.date}: ${m.desc}`} style={{ position: "absolute", left, top: "50%", transform: "translate(-50%, -50%)", width: 10, height: 10, borderRadius: "50%", background: row.color, boxShadow: `0 0 0 2px ${C.bg}, 0 0 0 3px ${row.color}40`, zIndex: 2, cursor: "default" }} />;
                  }
                  // Bar for range
                  const width = `${((end - start + 1) / totalPastMonths) * 100}%`;
                  return <div key={mi} title={`${m.date}: ${m.desc}`} style={{ position: "absolute", left, width, top: 6, bottom: 6, background: `${row.color}cc`, borderRadius: 4, zIndex: 1, cursor: "default" }} />;
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Ticket resolution heatmap */}
        <div style={{ height: 1, background: C.borderSubtle, marginTop: 10, marginBottom: 8, marginLeft: LW }} />
        <div style={{ display: "flex", alignItems: "center", minHeight: 36 }}>
          <div style={{ width: LW, flexShrink: 0, paddingRight: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>Tickets resolved</div>
          </div>
          <div style={{ flex: 1, display: "flex", gap: 2 }}>
            {resolvedByMonth.map((count, i) => {
              const intensity = count / maxResolved;
              return (
                <div key={i} title={`${pastMonthLabels[i]}: ${count} tickets`} style={{ flex: 1, height: 24, borderRadius: 3, background: count === 0 ? C.bgSunken : `rgba(18, 107, 249, ${0.15 + intensity * 0.75})`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "default" }}>
                  {count > 0 && <span style={{ fontSize: 9, fontWeight: 700, color: intensity > 0.5 ? "#fff" : C.brand }}>{count}</span>}
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", marginTop: 8, marginLeft: LW, gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 14, height: 10, borderRadius: 2, background: "rgba(18,107,249,0.15)" }} /><span style={{ fontSize: 10, color: C.textSubtle }}>Low</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 14, height: 10, borderRadius: 2, background: "rgba(18,107,249,0.55)" }} /><span style={{ fontSize: 10, color: C.textSubtle }}>Medium</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 14, height: 10, borderRadius: 2, background: "rgba(18,107,249,0.90)" }} /><span style={{ fontSize: 10, color: C.textSubtle }}>High</span></div>
          <span style={{ fontSize: 10, color: C.textSubtle, marginLeft: 8 }}>114 tickets resolved across 18 months</span>
        </div>

      </div>

      <div style={{ marginTop: 24, background: C.brandLight, borderRadius: 10, padding: 20, border: `1px solid ${C.brandTint}` }}>
        <div style={{ fontWeight: 600, fontSize: 14, color: C.brand, marginBottom: 10 }}>Read on the current state</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          {[
            { label: "What the page should emphasize", text: "Shipped hardening work, active hardening work, and the immediate next operational priorities." },
            { label: "What the page should avoid", text: "Speculative multi-phase architecture plans that are not yet aligned with what engineering is actually discussing and shipping." },
            { label: "Current operational center of gravity", text: "Charge posting visibility, clearer alerting, and stronger pre-run and post-run controls." },
            { label: "Why this framing is better", text: "It reflects Alexis and Julio's work more accurately and makes the story easier for Ethan and others to follow." },
          ].map((item, i) => (
            <div key={i}><div style={{ fontWeight: 600, fontSize: 12, color: C.brandDark, marginBottom: 4 }}>{item.label}</div><div style={{ fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>{item.text}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

            <div key={p.id} style={{ borderRadius: 12, border: `1px solid ${open ? p.color : C.borderSubtle}`, background: C.bg, overflow: "hidden" }}>
              {/* Header */}
              <div onClick={() => setExp(open ? null : p.id)} style={{ display: "flex", alignItems: "center", gap: 14, padding: "18px 20px", cursor: "pointer", background: open ? `${p.color}08` : "transparent" }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: p.color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 16, flexShrink: 0 }}>{p.id}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: C.text }}>{p.title}</div>
                  <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>{p.dates} · {p.durationWeeks} weeks</div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                  <Tag color={p.color} bg={`${p.color}12`}>{p.priority}</Tag>
                  {needsCount > 0 && <Tag color="#B57300" bg="#FEF3E2">{needsCount} need tickets</Tag>}
                  <Tag color="#1A7A24" bg="#E6F9E8">{hasCount} have tickets</Tag>
                </div>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s", flexShrink: 0 }}><path d="M4 6L8 10L12 6" stroke={C.textSubtle} strokeWidth="1.5" strokeLinecap="round" /></svg>
              </div>
              {open && (
                <div style={{ borderTop: `1px solid ${C.borderSubtle}` }}>
                  {/* Why it matters */}
                  <div style={{ padding: "16px 20px", background: C.bgSunken, borderBottom: `1px solid ${C.borderSubtle}` }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Why This Phase Matters</div>
                    <div style={{ fontSize: 13, color: C.textSec, lineHeight: 1.65 }}>{p.whyItMatters}</div>
                  </div>
                  {/* Deliverables with ticket mapping */}
                  <div style={{ padding: "16px 20px 20px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>Deliverables</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {p.deliverables.map((d, i) => {
                        const ds = delivStatusLabel(d);
                        return (
                          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px", background: d.status === "needs_ticket" ? "#FFFCF5" : C.bg, borderRadius: 8, border: `1px solid ${d.status === "needs_ticket" ? "#F0DFB8" : C.borderSubtle}` }}>
                            <div style={{ width: 22, height: 22, borderRadius: 6, background: ds.bg, color: ds.fg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{ds.icon}</div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>{d.text}</div>
                              <div style={{ display: "flex", gap: 8, marginTop: 5, alignItems: "center", flexWrap: "wrap" }}>
                                <Tag color={ds.fg} bg={ds.bg}>{ds.label}</Tag>
                                {d.ticket && <JiraLink ticket={d.ticket} />}
                                {d.note && <span style={{ fontSize: 11, color: C.textSubtle, fontStyle: "italic" }}>{d.note}</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {/* Optional supplemental phase detail */}
                    {p.states && (
                      <div style={{ marginTop: 20, padding: 16, background: C.bgSunken, borderRadius: 10, border: `1px solid ${C.borderSubtle}` }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>Target Resident Eligibility States</div>
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          {p.states.map((s, i) => (
                            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 8, background: `${s.color}12`, border: `1px solid ${s.color}30` }}>
                              <div style={{ width: 10, height: 10, borderRadius: "50%", background: s.color }} />
                              <span style={{ fontSize: 12, fontWeight: 500, color: C.text }}>{s.label}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── TAB: JIRA ──

function JiraTab() {
  const [fA, setFA] = useState(""); const [fS, setFS] = useState("");
  const assignees = useMemo(() => [...new Set(tickets.map(t => t.assignee))].sort(), []);
  const statuses = useMemo(() => [...new Set(tickets.map(t => t.status))].sort(), []);
  const filtered = useMemo(() => tickets.filter(t => (!fA || t.assignee === fA) && (!fS || t.status === fS)), [fA, fS]);
  const sel = { padding: "6px 12px", border: `1px solid ${C.borderDefault}`, borderRadius: 6, fontSize: 13, fontFamily: "Inter, sans-serif", color: C.textSec, background: C.bg, cursor: "pointer" };
  return (
    <div>
      <SectionBar color={C.brand}>Jira Tickets — Epic CRM-2060</SectionBar>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>Assignee:</span>
        <select value={fA} onChange={e => setFA(e.target.value)} style={sel}><option value="">All</option>{assignees.map(a => <option key={a} value={a}>{a}</option>)}</select>
        <span style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginLeft: 12 }}>Status:</span>
        <select value={fS} onChange={e => setFS(e.target.value)} style={sel}><option value="">All</option>{statuses.map(s => <option key={s} value={s}>{s}</option>)}</select>
        <span style={{ marginLeft: "auto", fontSize: 13, color: C.textSubtle }}>{filtered.length} ticket{filtered.length !== 1 ? "s" : ""}</span>
      </div>
      <div style={{ borderRadius: 10, border: `1px solid ${C.borderSubtle}`, overflow: "hidden" }}>
        <div style={{ maxHeight: 520, overflowY: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead><tr>{["Key", "Assignee", "Status", "Priority", "Created", "Resolved", "Summary"].map(h => (<th key={h} style={{ background: C.brandDark, color: "#fff", fontWeight: 600, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase", padding: "10px 12px", textAlign: "left", whiteSpace: "nowrap", position: "sticky", top: 0, zIndex: 1 }}>{h}</th>))}</tr></thead>
            <tbody>
              {filtered.map((t, i) => { const sc = statusColor(t.status); const ac = assigneeColor(t.assignee); return (
                <tr key={t.key} style={{ borderBottom: `1px solid ${C.borderSubtle}`, background: i % 2 === 0 ? C.bg : C.brandLight }}>
                  <td style={{ padding: "8px 12px", whiteSpace: "nowrap" }}><a href={`https://liftlytics.atlassian.net/browse/${t.key}`} target="_blank" rel="noopener noreferrer" style={{ color: C.brand, fontWeight: 600, textDecoration: "none" }}>{t.key}</a></td>
                  <td style={{ padding: "8px 12px" }}><Tag color={ac.fg} bg={ac.bg}>{t.assignee}</Tag></td>
                  <td style={{ padding: "8px 12px" }}><Tag color={sc.fg} bg={sc.bg}>{t.status}</Tag></td>
                  <td style={{ padding: "8px 12px", color: C.textSec }}>{t.priority}</td>
                  <td style={{ padding: "8px 12px", color: C.textMuted, whiteSpace: "nowrap" }}>{t.created}</td>
                  <td style={{ padding: "8px 12px", color: C.textMuted, whiteSpace: "nowrap" }}>{t.resolved || "—"}</td>
                  <td style={{ padding: "8px 12px", color: C.textSec, maxWidth: 340 }}>{t.summary}</td>
                </tr>
              ); })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── MAIN ──

const allTabs = [
  { id: "overview", label: "Overview" },
  { id: "themes", label: "Progress by Theme" },
  { id: "timeline", label: "Timeline" },
  { id: "hardening", label: "Hardening Status" },
  { id: "jira", label: "Jira Tickets" },
];

function App() {
  const [activeTab, setActiveTab] = useState("overview");
  return (
    <div style={{ fontFamily: "Inter, system-ui, -apple-system, Arial, sans-serif", color: C.text, background: C.bgSunken, minHeight: "100vh" }}>
      <div style={{ background: `linear-gradient(135deg, ${C.brandDark} 0%, ${C.brand} 100%)`, padding: "32px 32px 20px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: 0, right: 0, width: 340, height: "100%", background: "linear-gradient(135deg, transparent 0%, rgba(18,107,249,0.12) 100%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 1020, margin: "0 auto", position: "relative", zIndex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 18, color: "#fff", letterSpacing: 0.5, marginBottom: 24 }}>UNION</div>
          <h1 style={{ fontSize: 28, fontWeight: 700, color: "#fff", margin: "0 0 6px" }}>Credit Builder: Product Progress & Hardening Status</h1>
          <p style={{ fontSize: 14, color: C.brandTint, margin: "0 0 4px", lineHeight: 1.5, maxWidth: 700 }}>18 months of engineering progress, current hardening work, and immediate next steps grounded in active Credit Builder work — Epic CRM-2060</p>
          <span style={{ display: "inline-block", marginTop: 12, padding: "5px 14px", background: "rgba(18,107,249,0.2)", border: "1px solid rgba(18,107,249,0.3)", borderRadius: 6, fontSize: 13, fontWeight: 500, color: C.brandMuted }}>November 2024 – August 2026</span>
          <div style={{ display: "flex", gap: 3, marginTop: 20, flexWrap: "wrap" }}>
            {allTabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ padding: "8px 16px", borderRadius: "8px 8px 0 0", border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: activeTab === tab.id ? C.bgSunken : "rgba(255,255,255,0.1)", color: activeTab === tab.id ? C.text : "rgba(255,255,255,0.7)", transition: "all 0.15s" }}>{tab.label}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 1020, margin: "0 auto", padding: "24px 32px 48px" }}>
        {activeTab === "overview" && <OverviewTab />}
        {activeTab === "themes" && <ThemesTab />}
        {activeTab === "timeline" && <TimelineTab />}
        {activeTab === "hardening" && <HardeningTab />}
        {activeTab === "jira" && <JiraTab />}
      </div>
      <div style={{ padding: "24px 32px", background: C.bgSunken, borderTop: `1px solid ${C.borderSubtle}`, textAlign: "center" }}>
        <p style={{ fontSize: 12, color: C.textSubtle }}>Credit Builder Product Progress Review · Union · Epic CRM-2060 · April 2026</p>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
